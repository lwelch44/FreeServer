name: SSH Key Diagnostic - ULTIMATE
on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Show Environment
        run: |
          echo "=== ENVIRONMENT INFO ==="
          echo "Runner: $(uname -a)"
          echo "Home: $HOME"
          echo "PWD: $(pwd)"
          echo "User: $(whoami)"
          echo "Git version: $(git --version)"
          echo "SSH version: $(ssh -V 2>&1)"
          
      - name: Setup SSH - Show Key Info (Safe)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          echo "=== SSH KEY DIAGNOSTIC ==="
          echo "Key length (chars): ${#SSH_PRIVATE_KEY}"
          echo "Key first 50 chars: ${SSH_PRIVATE_KEY:0:50}"
          echo "Key last 50 chars: ${SSH_PRIVATE_KEY: -50}"
          
          # Check if it looks like base64
          if echo "$SSH_PRIVATE_KEY" | grep -q '^[A-Za-z0-9+/=]*$'; then
            echo "✅ Key appears to be base64 encoded"
            echo "Decoded length: $(echo "$SSH_PRIVATE_KEY" | base64 -d | wc -c) bytes"
          else
            echo "⚠️ Key does NOT appear to be base64 encoded"
            echo "It may be raw SSH private key"
          fi
          
          # Try to decode and show key type
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > /tmp/key.b64
          if base64 -d /tmp/key.b64 > ~/.ssh/id_rsa 2>/dev/null; then
            echo "✅ Base64 decode successful"
            KEY_TYPE=$(head -1 ~/.ssh/id_rsa)
            echo "Key type: $KEY_TYPE"
            echo "Key line count: $(wc -l < ~/.ssh/id_rsa)"
          else
            echo "❌ Base64 decode failed"
            # Try as raw key
            echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
            KEY_TYPE=$(head -1 ~/.ssh/id_rsa 2>/dev/null || echo "Cannot read")
            echo "Raw key first line: $KEY_TYPE"
          fi
          
          chmod 600 ~/.ssh/id_rsa
          rm -f /tmp/key.b64
          
      - name: Configure SSH
        run: |
          echo "=== SSH CONFIGURATION ==="
          cat > ~/.ssh/config << 'EOF'
          Host github.com
            HostName github.com
            User git
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
          EOF
          
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          echo "SSH config created"
          
      - name: Test SSH Connection Verbose
        run: |
          echo "=== SSH CONNECTION TEST (VERBOSE) ==="
          echo "Testing SSH to GitHub..."
          ssh -T -v git@github.com 2>&1 | head -100 || echo "SSH test completed"
          
      - name: Test Git Clone with Debug
        run: |
          echo "=== GIT CLONE TEST WITH DEBUG ==="
          rm -rf /tmp/test-clone-debug
          
          echo "Attempt 1: Normal clone"
          GIT_SSH_COMMAND="ssh -v" git clone git@github.com:lwelch44/lihao.github.io.git /tmp/test-clone-debug 2>&1 | tail -50 || echo "Git clone attempt 1 finished"
          
          if [ ! -d "/tmp/test-clone-debug/.git" ]; then
            echo "\\n❌ Clone failed, trying with different SSH options..."
            echo "Attempt 2: With SSH batch mode"
            GIT_SSH_COMMAND="ssh -o BatchMode=yes" git clone git@github.com:lwelch44/lihao.github.io.git /tmp/test-clone-debug2 2>&1 | tail -50 || echo "Git clone attempt 2 finished"
          fi
          
      - name: Check Repository Access
        run: |
          echo "=== REPOSITORY ACCESS CHECK ==="
          if [ -d "/tmp/test-clone-debug/.git" ]; then
            echo "✅ Repository cloned successfully!"
            cd /tmp/test-clone-debug
            echo "Repository contents:"
            ls -la
            echo "Git remote:"
            git remote -v
            echo "Git status:"
            git status
          else
            echo "❌ Repository not cloned"
            echo "This indicates SSH key authentication failed."
          fi
          
      - name: Create Simple Test
        run: |
          echo "=== SIMPLE FILE TEST ==="
          if [ -d "/tmp/test-clone-debug" ]; then
            cd /tmp/test-clone-debug
            echo "Test file from diagnostic $(date)" > test-diagnostic.txt
            echo "File created: test-diagnostic.txt"
            cat test-diagnostic.txt
          else
            echo "❌ Cannot create test - repository not available"
          fi
          
      - name: Diagnosis Summary
        run: |
          echo "=== DIAGNOSIS SUMMARY ==="
          echo ""
          echo "Based on the tests above:"
          echo ""
          echo "1. If SSH connection fails:"
          echo "   - SSH key format is wrong"
          echo "   - Key is not base64 encoded in GitHub Secrets"
          echo "   - Key does not have write permissions on GitHub"
          echo ""
          echo "2. If SSH works but Git clone fails:"
          echo "   - Repository permissions issue"
          echo "   - SSH key not associated with your account"
          echo "   - Repository does not exist or is private"
          echo ""
          echo "3. If everything works:"
          echo "   - The problem is in your workflow configuration"
          echo ""
          echo "PLEASE CHECK: https://github.com/settings/keys"
          echo "Ensure 'FreeServer-Blog-Auto' key has WRITE permissions"