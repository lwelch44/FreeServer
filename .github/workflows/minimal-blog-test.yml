name: Minimal Blog Test
on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  test-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa.b64
          base64 -d ~/.ssh/id_rsa.b64 > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          rm ~/.ssh/id_rsa.b64
          
          cat > ~/.ssh/config << 'EOF'
          Host github.com
            HostName github.com
            User git
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
          EOF
          
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          
      - name: Configure Git
        run: |
          git config --global user.name "lwelch44"
          git config --global user.email "lihao574403035@gmail.com"
          
      - name: Clone Blog Repo
        run: |
          echo "Cloning blog repository..."
          git clone git@github.com:lwelch44/lihao.github.io.git /tmp/blog-test || true
          
      - name: Create Test Post
        run: |
          cd /tmp/blog-test
          DATE=$(date '+%Y-%m-%d')
          FILE="_posts/${DATE}-test-from-workflow.md"
          cat > "$FILE" << 'EOF'
---
layout: post
title: "Test Post from GitHub Actions"
date: $DATE
categories: test
---

## Hello from GitHub Actions!

This is a test post created automatically by GitHub Actions workflow.

- ✅ Blog publishing pathway works
- ✅ SSH authentication works  
- ✅ Git operations work
- ✅ GitHub Pages will rebuild automatically

**Timestamp**: $(date '+%Y-%m-%d %H:%M:%S')

EOF
          
          echo "Created test post: $FILE"
          ls -la _posts/
          
      - name: Commit and Push
        run: |
          cd /tmp/blog-test
          git add .
          git commit -m "Test: Auto-post from GitHub Actions $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push || echo "Push failed or nothing to push"
          
      - name: Verify
        run: |
          echo "=== TEST COMPLETE ==="
          echo "Blog URL: https://lwelch44.github.io/lihao.github.io/"
          echo "New post should appear in 1-2 minutes."
          echo "Check: https://github.com/lwelch44/lihao.github.io/commits"