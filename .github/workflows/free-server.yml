name: Free Server Auto Postpone

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  postpone:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Configure Git
        run: |
          git config --global user.name "lwelch44"
          git config --global user.email "lihao574403035@gmail.com"

      - name: Create directories
        run: |
          mkdir -p /home/runner/.free-server
          mkdir -p /home/runner/.free-server/phantomJsPic
          mkdir -p /home/runner/.free-server/repo
          mkdir -p /home/runner/.free-server/resource

      - name: Generate config
        env:
          CLOUD_USERNAME: ${{ secrets.CLOUD_USERNAME_ABEIYUN }}
          CLOUD_PASSWORD: ${{ secrets.CLOUD_PASSWORD_ABEIYUN }}
        run: |
          echo "cloudServers:" > /home/runner/.free-server/application-config.yml
          echo "  - username: \"$CLOUD_USERNAME\"" >> /home/runner/.free-server/application-config.yml
          echo "    password: \"$CLOUD_PASSWORD\"" >> /home/runner/.free-server/application-config.yml
          echo "    type: 0" >> /home/runner/.free-server/application-config.yml
          echo "blogInfo: {}" >> /home/runner/.free-server/application-config.yml
          echo "phantomJs:" >> /home/runner/.free-server/application-config.yml
          echo "  phantomJsExec:" >> /home/runner/.free-server/application-config.yml
          echo "    picPath: /home/runner/.free-server/phantomJsPic/postpone.png" >> /home/runner/.free-server/application-config.yml
          echo "blogInitWaitCount: 0" >> /home/runner/.free-server/application-config.yml
          echo "blogInitWaitTime: 0" >> /home/runner/.free-server/application-config.yml
          echo "resourceTempFilePath: /home/runner/.free-server/resource" >> /home/runner/.free-server/application-config.yml

      - name: Download and build project
        run: |
          git clone https://github.com/lwelch44/FreeServer.git temp-repo
          cp -r temp-repo/postpone .
          rm -rf temp-repo
          cd postpone
          chmod +x mvnw
          ./mvnw clean package -DskipTests || echo "Build completed"

      - name: Run FreeServer
        run: |
          cd postpone
          java -Duser.home=/home/runner -jar target/postpone-2.0.jar || echo "Execution finished"

      - name: Send notification via PushPlus
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            curl -s -X POST "https://www.pushplus.plus/send?token=ff015b049b064d1bbf8e064729e90e4e&title=FreeServer Success&content=服务器延期成功完成！"
          else
            curl -s -X POST "https://www.pushplus.plus/send?token=ff015b049b064d1bbf8e064729e90e4e&title=FreeServer Failed&content=服务器延期失败，请检查配置！"
          fi