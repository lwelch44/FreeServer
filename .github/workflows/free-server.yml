name: Free Server Auto Postpone

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  postpone:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Setup SSH manually (bypass ssh-agent)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          PAGES_REPO: ${{ secrets.PAGES_REPO }}
        run: |
          # 创建 SSH 目录
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # 保存私钥
          echo "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # 生成公钥
          ssh-keygen -y -f ~/.ssh/id_rsa > ~/.ssh/id_rsa.pub 2>/dev/null || echo "Failed to generate public key"
          
          # 创建 SSH config
          cat > ~/.ssh/config << EOF
          Host github.com
            HostName github.com
            User git
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
          EOF
          
          # 添加 GitHub 到 known_hosts
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          
          # 测试连接
          echo "Testing SSH connection..."
          ssh -T git@github.com || echo "SSH test completed (exit code: $?)"
          
          # 如果 PAGES_REPO 存在，测试克隆
          if [ -n "$PAGES_REPO" ]; then
            echo "Testing clone of blog repo..."
            rm -rf /tmp/test-repo
            git clone git@github.com:$PAGES_REPO.git /tmp/test-repo || echo "Clone test completed (exit code: $?)"
          fi

      - name: Configure Git
        run: |
          git config --global user.name "lwelch44"
          git config --global user.email "lihao574403035@gmail.com"

      - name: Create directories (multiple paths)
        run: |
          # 创建工作流使用的目录
          mkdir -p /home/runner/.free-server
          mkdir -p /home/runner/.free-server/phantomJsPic
          mkdir -p /home/runner/.free-server/repo
          mkdir -p /home/runner/.free-server/resource
          
          # 也创建源代码中使用的目录（以防万一）
          mkdir -p /freeServer
          mkdir -p /freeServer/repo
          mkdir -p /freeServer/phantomJsPic
          mkdir -p /freeServer/resource
          
          echo "Created directories:"
          echo "- /home/runner/.free-server/repo"
          echo "- /freeServer/repo"
          echo "- /home/runner/.free-server/phantomJsPic"
          echo "- /home/runner/.free-server/resource"

      - name: Debug environment variables
        env:
          CLOUD_USERNAME: ${{ secrets.CLOUD_USERNAME_ABEIYUN }}
          CLOUD_PASSWORD: ${{ secrets.CLOUD_PASSWORD_ABEIYUN }}
          PAGES_REPO: ${{ secrets.PAGES_REPO }}
        run: |
          echo "=== Debug Environment Variables ==="
          echo "CLOUD_USERNAME: [${#CLOUD_USERNAME} chars]"
          echo "CLOUD_PASSWORD: [${#CLOUD_PASSWORD} chars]"
          echo "PAGES_REPO: $PAGES_REPO [${#PAGES_REPO} chars]"
          
          if [ -z "$CLOUD_USERNAME" ]; then
            echo "❌ WARNING: CLOUD_USERNAME is empty!"
          else
            echo "✅ CLOUD_USERNAME is set"
          fi
          
          if [ -z "$CLOUD_PASSWORD" ]; then
            echo "❌ WARNING: CLOUD_PASSWORD is empty!"
          else
            echo "✅ CLOUD_PASSWORD is set"
          fi
          
          if [ -z "$PAGES_REPO" ]; then
            echo "⚠️  WARNING: PAGES_REPO is empty! Blog will be disabled."
          else
            echo "✅ PAGES_REPO is set: $PAGES_REPO"
          fi

      - name: Generate enhanced config with correct URI
        env:
          CLOUD_USERNAME: ${{ secrets.CLOUD_USERNAME_ABEIYUN }}
          CLOUD_PASSWORD: ${{ secrets.CLOUD_PASSWORD_ABEIYUN }}
          PAGES_REPO: ${{ secrets.PAGES_REPO }}
        run: |
          echo "=== Generating application-config.yml ==="
          mkdir -p /home/runner/.free-server
          
          # 根据源代码中的格式生成配置
          cat > /home/runner/.free-server/application-config.yml << 'EOF'
cloudServers:
  -
    username: "${CLOUD_USERNAME}"
    password: "${CLOUD_PASSWORD}"
    type: 0

blogInfo:
  # 使用正确的.git后缀格式
  uri: git@github.com:lwelch44/lihao.github.io.git
  # 同时尝试两种路径
  localPath: /home/runner/.free-server/repo
  username: lwelch44

phantomJs:
  phantomJsExec:
    picPath: /home/runner/.free-server/phantomJsPic/postpone.png

blogInitWaitCount: 10
blogInitWaitTime: 1

resourceTempFilePath: /home/runner/.free-server/resource
EOF
          
          echo "Config generated at /home/runner/.free-server/application-config.yml"
          echo "=== Config content ==="
          cat /home/runner/.free-server/application-config.yml
          echo "=== End config ==="
          
          # 也创建一份在源代码期望的路径
          cat > /freeServer/application-config.yml << 'EOF'
cloudServers:
  -
    username: "${CLOUD_USERNAME}"
    password: "${CLOUD_PASSWORD}"
    type: 0

blogInfo:
  uri: git@github.com:lwelch44/lihao.github.io.git
  localPath: /freeServer/repo
  username: lwelch44

phantomJs:
  phantomJsExec:
    picPath: /freeServer/phantomJsPic/postpone.png

blogInitWaitCount: 10
blogInitWaitTime: 1

resourceTempFilePath: /freeServer/resource
EOF
          
          echo "Also created config at /freeServer/application-config.yml"

      - name: Download and build project
        run: |
          echo "=== Downloading and building FreeServer ==="
          git clone https://github.com/lwelch44/FreeServer.git temp-repo
          cp -r temp-repo/postpone .
          rm -rf temp-repo
          cd postpone
          chmod +x mvnw
          echo "Building project..."
          ./mvnw clean package -DskipTests 2>&1 | tail -50
          echo "Build completed (check logs above)"

      - name: Check FreeServer structure
        run: |
          echo "=== Checking FreeServer structure ==="
          echo "Current directory: $(pwd)"
          echo "Postpone directory contents:"
          ls -la postpone/
          echo "JAR file:"
          ls -la postpone/target/*.jar 2>/dev/null || echo "No JAR file found"
          echo "Config files in resources:"
          find postpone/src/main/resources -name "*.yml" -o -name "*.yaml" | xargs -I {} sh -c 'echo "=== {} ===" && head -20 {}'

      - name: Run FreeServer with detailed logging
        id: run-freeserver
        run: |
          echo "=== Running FreeServer ==="
          cd postpone
          
          # 运行Java程序并捕获输出
          echo "Starting FreeServer with config from: /home/runner/.free-server/application-config.yml"
          echo "Current directory: $(pwd)"
          echo "User home: $HOME"
          
          # 运行Java程序，将输出保存到文件
          java -Duser.home=/home/runner -jar target/postpone-2.0.jar 2>&1 | tee /tmp/freeserver-output.log
          
          EXIT_CODE=$?
          echo "FreeServer exit code: $EXIT_CODE"
          
          # 检查输出文件
          echo "=== FreeServer output (last 100 lines) ==="
          tail -100 /tmp/freeserver-output.log
          
          # 检查是否有博客相关的输出
          echo "=== Checking for blog-related output ==="
          grep -i "blog\|git\|repo\|commit\|push\|clone\|pull" /tmp/freeserver-output.log || echo "No blog-related output found"
          
          # 保存退出代码供后续步骤使用
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

      - name: Check FreeServer directories after run
        run: |
          echo "=== Checking FreeServer directories ==="
          echo "Directory /home/runner/.free-server:"
          ls -la /home/runner/.free-server/ 2>/dev/null || echo "Directory not found"
          
          echo "Directory /freeServer:"
          ls -la /freeServer/ 2>/dev/null || echo "Directory not found"
          
          echo "Blog repo directory check:"
          if [ -d "/home/runner/.free-server/repo/.git" ]; then
            echo "✅ Blog repo found at /home/runner/.free-server/repo/.git"
            cd /home/runner/.free-server/repo
            echo "Git status:"
            git status 2>/dev/null || echo "Cannot get git status"
            echo "Latest commits:"
            git log --oneline -5 2>/dev/null || echo "No git history"
          else
            echo "❌ Blog repo NOT found at /home/runner/.free-server/repo/.git"
          fi
          
          if [ -d "/freeServer/repo/.git" ]; then
            echo "✅ Blog repo found at /freeServer/repo/.git"
            cd /freeServer/repo
            echo "Git status:"
            git status 2>/dev/null || echo "Cannot get git status"
          else
            echo "❌ Blog repo NOT found at /freeServer/repo/.git"
          fi

      - name: Enhanced blog repository check
        run: |
          echo "=== Enhanced Blog Repository Check ==="
          
          # 检查可能的目录
          POSSIBLE_PATHS="/home/runner/.free-server/repo /freeServer/repo /home/runner/freeServer/repo"
          
          for path in $POSSIBLE_PATHS; do
            if [ -d "$path/.git" ]; then
              echo "✅ Found blog repo at: $path"
              cd "$path"
              echo "  Current branch: $(git branch --show-current 2>/dev/null || echo 'unknown')"
              echo "  Latest commit: $(git log --oneline -1 2>/dev/null || echo 'none')"
              echo "  Files in repo:"
              find . -type f -name "*.md" -o -name "*.html" -o -name "*.yml" -o -name "*.yaml" | head -20
              echo "  Git remote:"
              git remote -v 2>/dev/null || echo "    No remote configured"
            else
              echo "❌ No blog repo at: $path"
            fi
          done
          
          # 检查FreeServer输出中的博客相关日志
          if [ -f "/tmp/freeserver-output.log" ]; then
            echo "=== Blog-related logs from FreeServer ==="
            grep -A5 -B5 -i "blog\|github\|git\|repo\|commit\|push\|clone" /tmp/freeserver-output.log || echo "No blog-related logs found"
          fi

      - name: Send notification via PushPlus
        if: always()
        run: |
          STATUS="${{ job.status }}"
          BLOG_UPDATED="false"
          
          # 检查博客是否更新
          if [ -d "/home/runner/.free-server/repo/.git" ] || [ -d "/freeServer/repo/.git" ]; then
            BLOG_UPDATED="true"
          fi
          
          if [ "$STATUS" = "success" ]; then
            if [ "$BLOG_UPDATED" = "true" ]; then
              curl -s -X POST "https://www.pushplus.plus/send?token=ff015b049b064d1bbf8e064729e90e4e&title=FreeServer Success&content=✅ 服务器延期成功完成！✅ 博客已更新。"
            else
              curl -s -X POST "https://www.pushplus.plus/send?token=ff015b049b064d1bbf8e064729e90e4e&title=FreeServer Success&content=✅ 服务器延期成功完成！⚠️ 博客未更新（可能是首次运行或配置问题）。"
            fi
          else
            curl -s -X POST "https://www.pushplus.plus/send?token=ff015b049b064d1bbf8e064729e90e4e&title=FreeServer Failed&content=❌ 服务器延期失败，请检查配置！Job status: $STATUS"
          fi