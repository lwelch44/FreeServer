name: Free Server Auto Postpone

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  postpone:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Setup SSH manually (bypass ssh-agent)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          PAGES_REPO: ${{ secrets.PAGES_REPO }}
        run: |
          # 创建 SSH 目录
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # 保存私钥
          echo "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # 生成公钥
          ssh-keygen -y -f ~/.ssh/id_rsa > ~/.ssh/id_rsa.pub 2>/dev/null || echo "Failed to generate public key"
          
          # 创建 SSH config
          cat > ~/.ssh/config << EOF
          Host github.com
            HostName github.com
            User git
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
          EOF
          
          # 添加 GitHub 到 known_hosts
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          
          # 测试连接
          echo "Testing SSH connection..."
          ssh -T git@github.com || echo "SSH test completed (exit code: $?)"
          
          # 如果 PAGES_REPO 存在，测试克隆
          if [ -n "$PAGES_REPO" ]; then
            echo "Testing clone of blog repo..."
            rm -rf /tmp/test-repo
            git clone git@github.com:$PAGES_REPO /tmp/test-repo || echo "Clone test completed (exit code: $?)"
          fi

      - name: Configure Git
        run: |
          git config --global user.name "lwelch44"
          git config --global user.email "lihao574403035@gmail.com"

      - name: Create directories
        run: |
          mkdir -p /home/runner/.free-server
          mkdir -p /home/runner/.free-server/phantomJsPic
          mkdir -p /home/runner/.free-server/repo
          mkdir -p /home/runner/.free-server/resource

      - name: Debug environment variables
        env:
          CLOUD_USERNAME: ${{ secrets.CLOUD_USERNAME_ABEIYUN }}
          CLOUD_PASSWORD: ${{ secrets.CLOUD_PASSWORD_ABEIYUN }}
          PAGES_REPO: ${{ secrets.PAGES_REPO }}
        run: |
          echo "Debug info:"
          echo "CLOUD_USERNAME length: ${#CLOUD_USERNAME}"
          echo "CLOUD_PASSWORD length: ${#CLOUD_PASSWORD}"
          echo "PAGES_REPO: $PAGES_REPO (length: ${#PAGES_REPO})"
          
          # 检查环境变量是否设置
          if [ -z "$CLOUD_USERNAME" ]; then
            echo "WARNING: CLOUD_USERNAME is empty!"
          fi
          if [ -z "$CLOUD_PASSWORD" ]; then
            echo "WARNING: CLOUD_PASSWORD is empty!"
          fi
          if [ -z "$PAGES_REPO" ]; then
            echo "WARNING: PAGES_REPO is empty! Blog will be disabled."
          fi

      - name: Generate simplified config
        env:
          CLOUD_USERNAME: ${{ secrets.CLOUD_USERNAME_ABEIYUN }}
          CLOUD_PASSWORD: ${{ secrets.CLOUD_PASSWORD_ABEIYUN }}
          PAGES_REPO: ${{ secrets.PAGES_REPO }}
        run: |
          # 创建基本配置目录
          mkdir -p /home/runner/.free-server
          
          # 简单直接的配置生成
          cat > /home/runner/.free-server/application-config.yml << EOF
          cloudServers:
            - username: "${CLOUD_USERNAME}"
              password: "${CLOUD_PASSWORD}"
              type: 0
          blogInfo:
            uri: git@github.com:lwelch44/lihao.github.io
            localPath: /home/runner/.free-server/repo
            username: lwelch44
          phantomJs:
            phantomJsExec:
              picPath: /home/runner/.free-server/phantomJsPic/postpone.png
          blogInitWaitCount: 10
          blogInitWaitTime: 1
          resourceTempFilePath: /home/runner/.free-server/resource
          EOF
          
          echo "Config generated at /home/runner/.free-server/application-config.yml"
          echo "First few lines:"
          head -10 /home/runner/.free-server/application-config.yml

      - name: Download and build project
        run: |
          git clone https://github.com/lwelch44/FreeServer.git temp-repo
          cp -r temp-repo/postpone .
          rm -rf temp-repo
          cd postpone
          chmod +x mvnw
          ./mvnw clean package -DskipTests || echo "Build completed"

      - name: Run FreeServer
        run: |
          cd postpone
          java -Duser.home=/home/runner -jar target/postpone-2.0.jar || echo "Execution finished"

      - name: Check if blog was updated
        run: |
          echo "Checking blog repo..."
          if [ -d "/home/runner/.free-server/repo/.git" ]; then
            cd /home/runner/.free-server/repo
            echo "Latest commits:"
            git log --oneline -5 2>/dev/null || echo "No git history"
            
            # 列出文件
            echo -e "\nFiles in repo:"
            find . -type f -name "*.md" -o -name "*.html" | head -10
          else
            echo "Blog repo directory not found"
          fi

      - name: Send notification via PushPlus
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            curl -s -X POST "https://www.pushplus.plus/send?token=ff015b049b064d1bbf8e064729e90e4e&title=FreeServer Success&content=服务器延期成功完成！博客已更新。"
          else
            curl -s -X POST "https://www.pushplus.plus/send?token=ff015b049b064d1bbf8e064729e90e4e&title=FreeServer Failed&content=服务器延期失败，请检查配置！Job status: $STATUS"
          fi