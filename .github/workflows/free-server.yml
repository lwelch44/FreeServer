name: FreeServer Blog Test

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  blog-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          
      - name: Setup SSH for blog
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa > ~/.ssh/id_rsa.pub 2>/dev/null || true
          
          cat > ~/.ssh/config << EOF
          Host github.com
            HostName github.com
            User git
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
          EOF
          
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          
          # Test SSH connection
          ssh -T git@github.com 2>&1 | head -3 || echo "SSH test completed"
          
      - name: Configure Git
        run: |
          git config --global user.name "lwelch44"
          git config --global user.email "lihao574403035@gmail.com"
          
      - name: Pre-clone blog repository
        run: |
          echo "=== Cloning blog repository ==="
          mkdir -p /home/runner/.free-server/repo
          git clone git@github.com:lwelch44/lihao.github.io.git /home/runner/.free-server/repo || echo "Clone failed or already exists"
          
          # Also try the other path
          mkdir -p /freeServer/repo
          git clone git@github.com:lwelch44/lihao.github.io.git /freeServer/repo || echo "Second clone failed or already exists"
          
      - name: Create FreeServer config
        env:
          CLOUD_USERNAME: ${{ secrets.CLOUD_USERNAME_ABEIYUN }}
          CLOUD_PASSWORD: ${{ secrets.CLOUD_PASSWORD_ABEIYUN }}
        run: |
          echo "=== Creating configuration ==="
          mkdir -p /home/runner/.free-server
          
          cat > /home/runner/.free-server/application-config.yml << EOF
cloudServers:
  -
    username: "$CLOUD_USERNAME"
    password: "$CLOUD_PASSWORD"
    type: 0

blogInfo:
  uri: git@github.com:lwelch44/lihao.github.io.git
  localPath: /home/runner/.free-server/repo
  username: lwelch44

phantomJs:
  phantomJsExec:
    picPath: /home/runner/.free-server/phantomJsPic/postpone.png

blogInitWaitCount: 10
blogInitWaitTime: 1

resourceTempFilePath: /home/runner/.free-server/resource
EOF
          
          echo "Configuration created:"
          cat /home/runner/.free-server/application-config.yml
          
      - name: Build and run FreeServer
        run: |
          echo "=== Building FreeServer ==="
          cd postpone || (git clone https://github.com/lwelch44/FreeServer.git && cd FreeServer/postpone)
          chmod +x mvnw
          ./mvnw clean package -DskipTests 2>&1 | tail -50
          
          echo "=== Running FreeServer ==="
          java -Duser.home=/home/runner -jar target/postpone-2.0.jar 2>&1 | tee /tmp/freeserver.log
          
      - name: Check blog for updates
        run: |
          echo "=== Checking blog repository ==="
          for path in "/home/runner/.free-server/repo" "/freeServer/repo"; do
            if [ -d "$path/.git" ]; then
              echo "Checking $path"
              cd "$path"
              git status 2>/dev/null || echo "Cannot check git status"
              git log --oneline -5 2>/dev/null || echo "Cannot get git log"
              
              # Check for new files
              find . -type f -name "*.md" -o -name "*.html" 2>/dev/null | head -10
            fi
          done
          
      - name: Push updates if any
        run: |
          echo "=== Pushing updates ==="
          for path in "/home/runner/.free-server/repo" "/freeServer/repo"; do
            if [ -d "$path/.git" ]; then
              cd "$path"
              if git status --porcelain 2>/dev/null | grep -q "."; then
                echo "Found changes in $path"
                git add . 2>/dev/null
                git commit -m "Auto-update from FreeServer $(date '+%Y-%m-%d %H:%M:%S')" 2>/dev/null && git push 2>/dev/null && echo "Pushed updates"
              fi
            fi
          done
          
      - name: Final status
        run: |
          echo "=== FINAL STATUS ==="
          echo "Blog URL: https://lwelch44.github.io/lihao.github.io/"
          echo "Check for new commits in: https://github.com/lwelch44/lihao.github.io"
          echo ""
          echo "If there are new posts, GitHub Pages will rebuild automatically."