name: FreeServer Blog Publisher

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  schedule:
    - cron: '0 */6 * * *'

jobs:
  publish-blog:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          
      - name: Setup SSH for GitHub
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # Try base64 decode first, fallback to raw key
          if echo "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/id_rsa 2>/dev/null; then
            echo "Using base64-decoded key"
          else
            echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
            echo "Using raw key"
          fi
          chmod 600 ~/.ssh/id_rsa
          
          # Verify key is valid
          if ! ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null 2>&1; then
            echo "SSH key is invalid or corrupted"
            echo "Key info:"
            head -1 ~/.ssh/id_rsa
            ls -la ~/.ssh/id_rsa
            exit 1
          fi
          echo "SSH key is valid"
          
          cat > ~/.ssh/config << 'EOF'
          Host github.com
            HostName github.com
            User git
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
          EOF
          
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts
          
          # Test connection
          ssh -T git@github.com 2>&1 || echo "SSH configured"
          
      - name: Configure Git
        run: |
          git config --global user.name "lwelch44"
          git config --global user.email "lihao574403035@gmail.com"
          
      - name: Clone blog repository
        run: |
          echo "Cloning blog repository..."
          mkdir -p /home/runner/.free-server
          
          # Clone properly and capture exit code
          if ! git clone git@github.com:lwelch44/lihao.github.io.git /home/runner/.free-server/repo; then
            echo "Clone failed"
            exit 1
          fi
          
          echo "Blog repository cloned"
          
      - name: Create FreeServer configuration
        env:
          CLOUD_USERNAME: ${{ secrets.CLOUD_USERNAME_ABEIYUN }}
          CLOUD_PASSWORD: ${{ secrets.CLOUD_PASSWORD_ABEIYUN }}
        run: |
          echo "Creating configuration..."
          
          # Create config file without heredoc to avoid YAML parsing issues
          printf 'cloudServers:\n  - username: "%s"\n  password: "%s"\n  type: 0\n\nblogInfo:\n  uri: git@github.com:lwelch44/lihao.github.io.git\n  localPath: /home/runner/.free-server/repo\n  username: lwelch44\n' \
            "$CLOUD_USERNAME" "$CLOUD_PASSWORD" > /home/runner/.free-server/application-config.yml
          
          echo "Configuration created"
          
      - name: Build FreeServer
        run: |
          echo "Building FreeServer..."
          
          # Check if postpone directory exists
          if [ ! -d "postpone" ]; then
            echo "Cloning FreeServer repository..."
            git clone https://github.com/lwelch44/FreeServer.git free-server-temp
            cp -r free-server-temp/postpone .
            rm -rf free-server-temp
          fi
          
          cd postpone
          chmod +x mvnw
          echo "Running Maven build..."
          ./mvnw clean package -DskipTests 2>&1 | tail -50
          echo "Build completed"
          
      - name: Run FreeServer
        run: |
          echo "Running FreeServer..."
          cd postpone
          java -Duser.home=/home/runner -jar target/postpone-2.0.jar 2>&1 | tee /tmp/freeserver-output.log
          
          echo "FreeServer output saved to /tmp/freeserver-output.log"
          
      - name: Check for blog updates
        run: |
          echo "Checking blog repository for updates..."
          
          if [ -d "/home/runner/.free-server/repo/.git" ]; then
            cd "/home/runner/.free-server/repo"
            
            if git status --porcelain 2>/dev/null | grep -q "."; then
              echo "Found uncommitted changes!"
              git status --porcelain 2>/dev/null
              
              # Add and commit
              git add . 2>/dev/null
              git commit -m "Auto-update from FreeServer $(date '+%Y-%m-%d %H:%M:%S')" 2>/dev/null && echo "Changes committed"
              
              # Push
              git push 2>/dev/null && echo "Blog updated successfully!" || echo "Push failed"
            else
              echo "No new blog content generated"
            fi
          else
            echo "Blog repository not found"
          fi
          
      - name: Final status
        run: |
          echo "=== BLOG PUBLISHING COMPLETE ==="
          echo ""
          echo "Blog URL: https://lwelch44.github.io/lihao.github.io/"
          echo "Blog repository: https://github.com/lwelch44/lihao.github.io"
          echo ""
          echo "If updates were pushed, GitHub Pages will rebuild automatically."
          echo "Check the blog in 1-2 minutes for new content."