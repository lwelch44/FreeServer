name: Free Server Auto Postpone (Fixed Blog)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  postpone:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Setup SSH manually
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          echo "=== Setting up SSH ==="
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # 保存私钥
          echo "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # 生成公钥
          ssh-keygen -y -f ~/.ssh/id_rsa > ~/.ssh/id_rsa.pub 2>/dev/null || echo "Failed to generate public key"
          
          # 创建SSH配置
          cat > ~/.ssh/config << EOF
          Host github.com
            HostName github.com
            User git
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
          EOF
          
          # 添加known_hosts
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          
          # 测试连接
          echo "Testing SSH connection..."
          ssh -T git@github.com 2>&1 | head -3 || echo "SSH test completed"

      - name: Configure Git
        run: |
          git config --global user.name "lwelch44"
          git config --global user.email "lihao574403035@gmail.com"

      - name: Pre-clone blog repository (CRITICAL FIX)
        id: pre-clone
        run: |
          echo "=== PRE-CLONING BLOG REPOSITORY ==="
          echo "This step ensures the blog repository exists before FreeServer starts"
          
          BLOG_URI="git@github.com:lwelch44/lihao.github.io.git"
          
          # 创建所有可能的目录
          mkdir -p /home/runner/.free-server
          mkdir -p /home/runner/.free-server/repo
          mkdir -p /home/runner/.free-server/phantomJsPic
          mkdir -p /home/runner/.free-server/resource
          
          # 尝试创建/freeServer目录（可能需要sudo）
          sudo mkdir -p /freeServer 2>/dev/null || mkdir -p /freeServer 2>/dev/null || echo "Warning: Cannot create /freeServer"
          sudo mkdir -p /freeServer/repo 2>/dev/null || mkdir -p /freeServer/repo 2>/dev/null || echo "Warning: Cannot create /freeServer/repo"
          
          # 设置权限
          sudo chmod 777 /freeServer 2>/dev/null || chmod 755 /freeServer 2>/dev/null || echo "Warning: Cannot chmod /freeServer"
          sudo chmod 777 /freeServer/repo 2>/dev/null || chmod 755 /freeServer/repo 2>/dev/null || echo "Warning: Cannot chmod /freeServer/repo"
          
          # 尝试克隆到两个位置
          echo "Attempting to clone blog repository to /home/runner/.free-server/repo..."
          if git clone "$BLOG_URI" /home/runner/.free-server/repo 2>&1; then
            echo "✅ Successfully cloned to /home/runner/.free-server/repo"
            echo "pre_clone_path=/home/runner/.free-server/repo" >> $GITHUB_OUTPUT
          else
            echo "❌ Failed to clone to /home/runner/.free-server/repo"
            echo "Checking if directory exists anyway..."
            if [ -d "/home/runner/.free-server/repo/.git" ]; then
              echo "✅ Blog repo already exists at /home/runner/.free-server/repo"
              echo "pre_clone_path=/home/runner/.free-server/repo" >> $GITHUB_OUTPUT
            fi
          fi
          
          echo "Attempting to clone blog repository to /freeServer/repo..."
          if git clone "$BLOG_URI" /freeServer/repo 2>&1; then
            echo "✅ Successfully cloned to /freeServer/repo"
            echo "pre_clone_path=/freeServer/repo" >> $GITHUB_OUTPUT
          else
            echo "❌ Failed to clone to /freeServer/repo"
            echo "Checking if directory exists anyway..."
            if [ -d "/freeServer/repo/.git" ]; then
              echo "✅ Blog repo already exists at /freeServer/repo"
              echo "pre_clone_path=/freeServer/repo" >> $GITHUB_OUTPUT
            fi
          fi
          
          # 验证克隆结果
          echo "\\n=== Verifying blog repositories ==="
          for path in "/home/runner/.free-server/repo" "/freeServer/repo"; do
            if [ -d "$path/.git" ]; then
              echo "✅ Blog repo verified at: $path"
              cd "$path"
              echo "  Branch: $(git branch --show-current 2>/dev/null || echo 'unknown')"
              echo "  Latest commit: $(git log --oneline -1 2>/dev/null || echo 'none')"
              echo "  Remote: $(git remote -v 2>/dev/null | head -1 || echo 'none')"
            else
              echo "❌ No blog repo at: $path"
            fi
          done

      - name: Create configuration with correct paths
        env:
          CLOUD_USERNAME: ${{ secrets.CLOUD_USERNAME_ABEIYUN }}
          CLOUD_PASSWORD: ${{ secrets.CLOUD_PASSWORD_ABEIYUN }}
        run: |
          echo "=== Creating configuration files ==="
          
          # 确定使用哪个路径（优先使用/freeServer/repo如果存在）
          BLOG_PATH="/home/runner/.free-server/repo"
          if [ -d "/freeServer/repo/.git" ]; then
            BLOG_PATH="/freeServer/repo"
            echo "Using /freeServer/repo for blog path"
          elif [ -d "/home/runner/.free-server/repo/.git" ]; then
            BLOG_PATH="/home/runner/.free-server/repo"
            echo "Using /home/runner/.free-server/repo for blog path"
          else
            echo "⚠️ Warning: No blog repository found, using default path"
          fi
          
          # 创建主配置文件
          mkdir -p /home/runner/.free-server
          cat > /home/runner/.free-server/application-config.yml << EOF
cloudServers:
  -
    username: "${CLOUD_USERNAME}"
    password: "${CLOUD_PASSWORD}"
    type: 0

blogInfo:
  uri: git@github.com:lwelch44/lihao.github.io.git
  localPath: ${BLOG_PATH}
  username: lwelch44

phantomJs:
  phantomJsExec:
    picPath: /home/runner/.free-server/phantomJsPic/postpone.png

blogInitWaitCount: 10
blogInitWaitTime: 1

resourceTempFilePath: /home/runner/.free-server/resource
EOF
          
          echo "Main config created at /home/runner/.free-server/application-config.yml"
          echo "=== Config content ==="
          cat /home/runner/.free-server/application-config.yml
          
          # 如果/freeServer目录可写，也创建一份配置
          if [ -w "/freeServer" ]; then
            cat > /freeServer/application-config.yml << EOF
cloudServers:
  -
    username: "${CLOUD_USERNAME}"
    password: "${CLOUD_PASSWORD}"
    type: 0

blogInfo:
  uri: git@github.com:lwelch44/lihao.github.io.git
  localPath: ${BLOG_PATH}
  username: lwelch44

phantomJs:
  phantomJsExec:
    picPath: /freeServer/phantomJsPic/postpone.png

blogInitWaitCount: 10
blogInitWaitTime: 1

resourceTempFilePath: /freeServer/resource
EOF
            echo "\\nSecondary config created at /freeServer/application-config.yml"
          fi

      - name: Download and build project
        run: |
          echo "=== Downloading and building FreeServer ==="
          git clone https://github.com/lwelch44/FreeServer.git temp-repo
          cp -r temp-repo/postpone .
          rm -rf temp-repo
          cd postpone
          chmod +x mvnw
          echo "Building project (this may take a minute)..."
          ./mvnw clean package -DskipTests 2>&1 | tail -100
          echo "Build completed"

      - name: Run FreeServer with forced blog initialization
        id: run-freeserver
        run: |
          echo "=== Running FreeServer with pre-initialized blog ==="
          cd postpone
          
          echo "Current directory: $(pwd)"
          echo "User home: $HOME"
          echo "Blog path from config:"
          grep "localPath:" /home/runner/.free-server/application-config.yml
          
          # 运行FreeServer并捕获详细输出
          echo "Starting FreeServer..."
          java -Duser.home=/home/runner -jar target/postpone-2.0.jar 2>&1 | tee /tmp/freeserver-detailed.log
          
          EXIT_CODE=$?
          echo "FreeServer exit code: $EXIT_CODE"
          
          # 分析输出
          echo "\\n=== FreeServer output analysis ==="
          echo "Total lines in log: $(wc -l < /tmp/freeserver-detailed.log)"
          
          # 查找博客相关输出
          echo "\\n=== Blog-related messages ==="
          grep -i -B2 -A2 "blog\|git\|repo\|clone\|pull\|push\|commit\|github" /tmp/freeserver-detailed.log || echo "No blog-related messages found"
          
          # 查找错误
          echo "\\n=== Error messages ==="
          grep -i "error\|fail\|exception\|cannot\|unable" /tmp/freeserver-detailed.log | head -20 || echo "No error messages found"
          
          # 保存退出代码
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

      - name: Verify blog repository after FreeServer
        run: |
          echo "=== Verifying blog repository after FreeServer run ==="
          
          # 检查博客仓库是否被修改
          for path in "/home/runner/.free-server/repo" "/freeServer/repo"; do
            if [ -d "$path/.git" ]; then
              echo "\\n=== Checking blog repo at: $path ==="
              cd "$path"
              echo "Git status:"
              git status 2>/dev/null || echo "Cannot get git status"
              echo "Recent commits:"
              git log --oneline -10 2>/dev/null || echo "Cannot get git log"
              echo "Uncommitted changes:"
              git diff --name-only 2>/dev/null | head -10 || echo "No uncommitted changes or cannot check"
              
              # 检查是否有新文件
              echo "\\nNew files (excluding .git):"
              find . -type f -not -path "./.git/*" -name "*.md" -o -name "*.html" -o -name "*.yml" | head -20
            fi
          done
          
          # 检查FreeServer输出中是否有博客更新
          if [ -f "/tmp/freeserver-detailed.log" ]; then
            echo "\\n=== Checking for blog update indicators ==="
            if grep -i "blog.*update\|post.*created\|article.*published\|commit.*success" /tmp/freeserver-detailed.log; then
              echo "✅ Blog update detected in FreeServer logs"
            else
              echo "❌ No blog update detected in logs"
            fi
          fi

      - name: Push blog updates if any
        id: push-updates
        run: |
          echo "=== Pushing blog updates if any ==="
          
          # 确定哪个仓库有更改
          for path in "/home/runner/.free-server/repo" "/freeServer/repo"; do
            if [ -d "$path/.git" ]; then
              cd "$path"
              if git status --porcelain 2>/dev/null | grep -q "."; then
                echo "📝 Found uncommitted changes in $path"
                echo "Changes:"
                git status --porcelain 2>/dev/null
                
                # 添加所有文件
                git add . 2>/dev/null
                
                # 提交
                COMMIT_MSG="Auto-update from FreeServer $(date '+%Y-%m-%d %H:%M:%S')"
                if git commit -m "$COMMIT_MSG" 2>/dev/null; then
                  echo "✅ Committed changes: $COMMIT_MSG"
                  
                  # 推送
                  if git push 2>/dev/null; then
                    echo "✅ Successfully pushed to GitHub"
                    echo "push_success=true" >> $GITHUB_OUTPUT
                    echo "push_path=$path" >> $GITHUB_OUTPUT
                  else
                    echo "❌ Failed to push to GitHub"
                  fi
                else
                  echo "❌ Failed to commit changes"
                fi
              else
                echo "📭 No uncommitted changes in $path"
              fi
            fi
          done
          
          if [ -z "\$(echo \${{ steps.push-updates.outputs.push_success }})" ]; then
            echo "ℹ️  No blog updates to push"
          fi

      - name: Final verification
        run: |
          echo "=== FINAL VERIFICATION ==="
          echo "Blog URL: https://lwelch44.github.io/lihao.github.io/"
          echo ""
          echo "Summary:"
          echo "1. Blog repository pre-cloned: \${{ steps.pre-clone.outputs.pre_clone_path || 'NOT FOUND' }}"
          echo "2. FreeServer exit code: \${{ steps.run-freeserver.outputs.exit_code || 'UNKNOWN' }}"
          echo "3. Blog updates pushed: \${{ steps.push-updates.outputs.push_success || 'false' }}"
          echo "4. Push path: \${{ steps.push-updates.outputs.push_path || 'N/A' }}"
          echo ""
          echo "Next steps:"
          echo "1. Visit the blog URL to check if it's accessible"
          echo "2. Wait 1-2 minutes for GitHub Pages to rebuild if updates were pushed"
          echo "3. Check blog repository commits for new content"

      - name: Send notification
        if: always()
        run: |
          STATUS="${{ job.status }}"
          BLOG_UPDATED="\${{ steps.push-updates.outputs.push_success || 'false' }}"
          
          if [ "$STATUS" = "success" ]; then
            if [ "$BLOG_UPDATED" = "true" ]; then
              curl -s -X POST "https://www.pushplus.plus/send?token=ff015b049b064d1bbf8e064729e90e4e&title=✅ FreeServer Success&content=✅ 服务器延期成功！✅ 博客已更新并推送。"
            else
              curl -s -X POST "https://www.pushplus.plus/send?token=ff015b049b064d1bbf8e064729e90e4e&title=✅ FreeServer Success&content=✅ 服务器延期成功！⚠️ 博客未更新（可能需要更多配置）。"
            fi
          else
            curl -s -X POST "https://www.pushplus.plus/send?token=ff015b049b064d1bbf8e064729e90e4e&title=❌ FreeServer Failed&content=❌ 服务器延期失败，请检查日志。Job status: $STATUS"
          fi